<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<style>
    body{
        font-family: Arial, sans-serif;
        display:flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
        background-color: #f4f4f9;
    }
    .card{
        background-color: #fff;
        padding: 20px;
        border-radius: 8px;
        box-shadow: 0 4px 8px rgba(0,0,0,0.1);
        text-align: center;
        width: 500px;
    }
    .error{
        color:red;
        font-family: bold;
    }

</style>


<body>

    <div class="card" id="user-card">
        <input type="text" id="username" placeholder="Enter GitHub username">
        <button  onclick="fetchGitHubUser() ">search</button>
        <h3>loading profile</h3>
    </div>


    <script>
    
        const input =document.getElementById('username');
            

        async function fetchGitHubUser(){

            const username = input.value.trim();
            const cardContainer = document.getElementById('user-card');
            try{
                let responce = await fetch(`https://api.github.com/users/${username}`);
                if(!responce.ok){
                    throw new Error("url is not correct"+ responce.status);
                }
                let data = await responce. json();
                cardContainer.innerHTML =`
                <img class="avatar" src="${data.avatar_url}" alt="Profile Picture">
                    <h2>${data.name || 'No Name'}</h2>
                    <p>${data.bio || 'Is user ne koi bio nahi likha hai.'}</p>
                    <p><strong>Followers:</strong> ${data.followers}</p>
                    `;
                
            }
            catch(error){
                cardContainer.innerHTML =`<p class="error">Something went wrong: ${error.message} </p> `;
            }
        }

    </script>
</body>
</html>
